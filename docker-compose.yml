# STATUS: DORMANT / v2.4.0-PREP / NOT ACTIVE
# Purpose: Future local Postgres + Redis state services for gateway/agents.
# Safe to commit. Does not start unless explicitly invoked with `docker compose up -d`.

services:
  postgres:
    image: postgres:16-alpine
    container_name: echoes-postgres
    environment:
      POSTGRES_USER: echoes
      POSTGRES_PASSWORD: ${DB_PASSWORD:-echoes_secure_2026}
      POSTGRES_DB: echoes_prod
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoes -d echoes_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: echoes-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_2026} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
